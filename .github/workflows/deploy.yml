name: Deploy to Production

# Триггер на push в main ветку
on:
  push:
    branches:
      - main
  workflow_dispatch:  # Позволяет запускать вручную

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  # Opt in to Node.js 24 for JavaScript actions to avoid Node 20 deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: |
          # Create temporary env files for validation
          cp .env.prod.example .env.prod || touch .env.prod
          cp .env.prod.db.example .env.prod.db || touch .env.prod.db

          # Validate syntax
          docker compose -f docker-compose.prod.yml config > /dev/null
          echo "✅ docker-compose.prod.yml syntax is valid"

          # Cleanup
          rm -f .env.prod .env.prod.db

      - name: Check for required files
        run: |
          required_files=(
            "Dockerfile"
            "docker-compose.prod.yml"
            "entrypoint.sh"
            "requirements.prod.txt"
            "nginx/default.conf"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Required file missing: $file"
              exit 1
            fi
          done
          echo "✅ All required files present"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          # Тесты используют config.test_settings (SQLite, MD5-hasher, миграции отключены).
          # Эти переменные нужны только чтобы импорт config.settings не упал на проверке.
          SECRET_KEY: ci-test-secret-key-not-for-production  # pragma: allowlist secret
          DEBUG: "True"
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          pytest --tb=short

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [validate, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          echo "Building Docker image..."
          docker build -t insurance-broker:latest .
          echo "✅ Docker image built successfully"

      - name: Verify image exists
        run: |
          echo "Checking if image exists..."
          docker images | grep insurance-broker
          echo "✅ Image verified"

      - name: Test Docker image
        run: |
          echo "Testing Docker image..."
          docker run --rm --entrypoint python insurance-broker:latest --version
          echo "✅ Docker image is functional"

  deploy:
    name: Deploy to Timeweb Cloud
    runs-on: ubuntu-latest
    needs: build
    env:
      SSH_PORT: ${{ secrets.SSH_PORT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          set -euo pipefail

          if [ -z "${SSH_PRIVATE_KEY:-}" ] || [ -z "${DROPLET_HOST:-}" ] || [ -z "${DROPLET_USER:-}" ]; then
            echo "❌ Missing required deployment secrets (SSH_PRIVATE_KEY, DROPLET_HOST, DROPLET_USER)"
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -4 -p "${SSH_PORT:-22}" -H "$DROPLET_HOST" >> ~/.ssh/known_hosts
          echo "✅ SSH configured"

      - name: Preflight SSH connectivity
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          set -euo pipefail
          echo "Network diagnostics for $DROPLET_HOST:${SSH_PORT:-22}"
          echo "--- DNS (all records via getent ahosts) ---"
          getent ahosts "$DROPLET_HOST" || true
          echo "--- IPv4 TCP probe ---"
          ipv4_list=$(getent ahostsv4 "$DROPLET_HOST" | awk '{print $1}' | sort -u || true)
          if [ -z "${ipv4_list:-}" ]; then
            echo "⚠️ No IPv4 addresses resolved for $DROPLET_HOST"
          else
            for ip in $ipv4_list; do
              if timeout 5 bash -lc "cat < /dev/null > /dev/tcp/$ip/${SSH_PORT:-22}" 2>/dev/null; then
                echo "✅ TCP reachable: $ip:${SSH_PORT:-22}"
              else
                echo "❌ TCP not reachable: $ip:${SSH_PORT:-22}"
              fi
            done
          fi
          echo "Checking SSH access to $DROPLET_HOST:${SSH_PORT:-22}"
          ssh -4 -i ~/.ssh/deploy_key \
              -p "${SSH_PORT:-22}" \
              -o BatchMode=yes \
              -o ConnectTimeout=15 \
              -o StrictHostKeyChecking=no \
              "$DROPLET_USER@$DROPLET_HOST" \
              "echo '✅ SSH connection established'; hostname"

      - name: Copy files to server
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          rsync -avz -e "ssh -4 -i ~/.ssh/deploy_key -p ${SSH_PORT:-22} -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='venv' \
            --exclude='black_venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='.env.prod' \
            --exclude='.env.prod.db' \
            --exclude='db.sqlite3' \
            --exclude='certbot/' \
            ./ "$DROPLET_USER@$DROPLET_HOST:~/insurance_broker/"
          echo "✅ Files copied to server (preserving credentials and certificates)"

      - name: Verify env files on server
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          ssh -4 -i ~/.ssh/deploy_key -p "${SSH_PORT:-22}" -o StrictHostKeyChecking=no "$DROPLET_USER@$DROPLET_HOST" << 'ENDSSH'
            set -e
            cd ~/insurance_broker

            # Check if .env.prod.db exists
            if [ ! -f .env.prod.db ]; then
              echo "❌ .env.prod.db not found!"
              echo "Please create it manually on the server before deploying"
              exit 1
            else
              echo "✅ .env.prod.db exists (preserving existing credentials)"
            fi

            # Check if .env.prod exists
            if [ ! -f .env.prod ]; then
              echo "❌ .env.prod not found!"
              echo "Please create it manually on the server before deploying"
              exit 1
            else
              echo "✅ .env.prod exists (preserving existing credentials)"
            fi

            echo "✅ Environment files verified (not modified)"
          ENDSSH

      - name: Check SSL certificates
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          SSL_STATUS=$(ssh -4 -i ~/.ssh/deploy_key -p "${SSH_PORT:-22}" -o StrictHostKeyChecking=no "$DROPLET_USER@$DROPLET_HOST" << 'ENDSSH'
            cd ~/insurance_broker

            # Check if SSL certificates exist
            if [ -d "certbot/conf/live/polis.insflow.ru" ]; then
              echo "✅ SSL certificates found"
              echo "true"
            else
              echo "⚠️  SSL certificates not found - will use initial config"

              # Backup SSL config and use initial config
              if [ -f "nginx/default.conf" ]; then
                cp nginx/default.conf nginx/default.conf.ssl
                cp nginx/default.conf.initial nginx/default.conf
                echo "✅ Switched to initial nginx config (no SSL)"
              fi
              echo "false"
            fi
          ENDSSH
          )

          # Extract the last line (true/false) from the output
          SSL_EXISTS=$(echo "$SSL_STATUS" | tail -n 1)
          echo "SSL_EXISTS=$SSL_EXISTS" >> $GITHUB_ENV
          echo "SSL certificates status: $SSL_EXISTS"

      - name: Deploy on server
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          # Note: Server uses docker-compose (v1 with hyphen), not docker compose (v2)
          ssh -4 -i ~/.ssh/deploy_key -p "${SSH_PORT:-22}" -o StrictHostKeyChecking=no "$DROPLET_USER@$DROPLET_HOST" << 'ENDSSH'
            set -e
            cd ~/insurance_broker

            echo "📦 Pulling latest images..."
            docker-compose -f docker-compose.prod.yml pull || true

            echo "🛑 Stopping old containers..."
            docker-compose -f docker-compose.prod.yml down

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "🔨 Building new images..."
            docker-compose -f docker-compose.prod.yml build

            echo "🚀 Starting containers with new images..."
            docker-compose -f docker-compose.prod.yml up -d

            echo "⏳ Waiting for services to be ready..."
            sleep 15

            echo "✅ Deployment completed"
          ENDSSH

      - name: Setup SSL (first deployment only)
        if: env.SSL_EXISTS == 'false'
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          ssh -4 -i ~/.ssh/deploy_key -p "${SSH_PORT:-22}" -o StrictHostKeyChecking=no "$DROPLET_USER@$DROPLET_HOST" << 'ENDSSH'
            set -e
            cd ~/insurance_broker

            echo "🔐 Setting up SSL certificates..."
            echo "⚠️  This is a first deployment - SSL setup required"
            echo ""
            echo "Please run the following command on the server:"
            echo "  cd ~/insurance_broker && ./scripts/setup-ssl.sh"
            echo ""
            echo "Or manually:"
            echo "  1. Verify DNS is configured: nslookup polis.insflow.ru"
            echo "  2. Run: docker-compose -f docker-compose.prod.yml run --rm certbot certonly --webroot --webroot-path=/var/www/certbot --email admin@insflow.ru --agree-tos --no-eff-email -d polis.insflow.ru"
            echo "  3. Switch to SSL config: cp nginx/default.conf.ssl nginx/default.conf"
            echo "  4. Restart nginx: docker-compose -f docker-compose.prod.yml restart nginx"
          ENDSSH

      - name: Run migrations
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          ssh -4 -i ~/.ssh/deploy_key -p "${SSH_PORT:-22}" -o StrictHostKeyChecking=no "$DROPLET_USER@$DROPLET_HOST" << 'ENDSSH'
            set -e
            cd ~/insurance_broker

            echo "⏳ Waiting for database to be ready..."
            sleep 10

            echo "🔧 Fixing migration conflicts..."
            # Remove old conflicting migration from database if exists
            docker-compose -f docker-compose.prod.yml exec -T db psql -U postgres -d insurance_broker -c "
              DELETE FROM django_migrations
              WHERE app = 'policies'
                AND name = '0011_alter_paymentschedule_unique_together';
            " 2>/dev/null || echo "No conflicting migration in database"

            # Remove old migration file if exists
            rm -f apps/policies/migrations/0011_alter_paymentschedule_unique_together.py 2>/dev/null || true
            echo "✅ Migration conflicts resolved"

            echo "🔄 Running database migrations..."
            docker-compose -f docker-compose.prod.yml run --rm web python manage.py migrate --noinput

            echo "📦 Collecting static files..."
            docker-compose -f docker-compose.prod.yml run --rm web python manage.py collectstatic --noinput

            echo "✅ Migrations completed"
          ENDSSH

      - name: Health check
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          ssh -4 -i ~/.ssh/deploy_key -p "${SSH_PORT:-22}" -o StrictHostKeyChecking=no "$DROPLET_USER@$DROPLET_HOST" << 'ENDSSH'
            set -e
            cd ~/insurance_broker

            echo "🏥 Checking container health..."
            docker-compose -f docker-compose.prod.yml ps

            # Check if web container is running
            if ! docker-compose -f docker-compose.prod.yml ps | grep -q "web.*Up"; then
              echo "❌ Web container is not running"
              docker-compose -f docker-compose.prod.yml logs web
              exit 1
            fi

            # Check if db container is running
            if ! docker-compose -f docker-compose.prod.yml ps | grep -q "db.*Up"; then
              echo "❌ Database container is not running"
              docker-compose -f docker-compose.prod.yml logs db
              exit 1
            fi

            echo "✅ All containers are healthy"
          ENDSSH

      - name: Cleanup SSH
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [validate, test, build, deploy]
    if: always()

    steps:
      - name: Deployment Success
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Deployment to production was successful!"
          echo "🌐 Application should be available at https://polis.insflow.ru"

      - name: Deployment Failure
        if: needs.deploy.result == 'failure' || needs.build.result == 'failure' || needs.test.result == 'failure' || needs.validate.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          echo "Please check the logs above for details."

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    env:
      SSH_PORT: ${{ secrets.SSH_PORT }}

    steps:
      - name: Setup SSH for rollback
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -4 -p "${SSH_PORT:-22}" -H "$DROPLET_HOST" >> ~/.ssh/known_hosts

      - name: Rollback to previous version
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          ssh -4 -i ~/.ssh/deploy_key -p "${SSH_PORT:-22}" -o StrictHostKeyChecking=no "$DROPLET_USER@$DROPLET_HOST" << 'ENDSSH'
            set -e
            cd ~/insurance_broker

            echo "⚠️  Deployment failed, attempting rollback..."

            # Try to restart with previous images
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d

            echo "🔄 Rollback completed - previous version restored"
          ENDSSH

      - name: Cleanup SSH
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key

      - name: Notify rollback
        run: |
          echo "⚠️  Deployment failed and rollback was executed"
          echo "Previous version has been restored"
          exit 1
