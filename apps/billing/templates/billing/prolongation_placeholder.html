{% extends "base.html" %}

{% block title %}Пролонгация{% endblock %}

{% block extra_css %}
{{ block.super }}
<style>
    .prolongation-page {
        color: #17324f;
    }

    .prolongation-card {
        border: 1px solid #dbe5f1;
        border-radius: 12px;
        background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
        padding: 1.25rem;
        box-shadow: 0 4px 14px rgba(14, 28, 46, 0.06);
    }

    .prolongation-kicker {
        color: #5d748d;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
    }

    .prolongation-title {
        margin: 0.35rem 0 0.45rem;
        font-weight: 800;
    }

    .prolongation-note {
        margin: 0;
        color: #3d5f7d;
    }
</style>
{% endblock %}

{% block content %}
<div class="prolongation-page">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'core:dashboard' %}"><i class="bi bi-house"></i> Главная</a></li>
            <li class="breadcrumb-item"><a href="{% url 'policies:payments' %}"><i class="bi bi-calendar-check"></i> Платежи</a></li>
            <li class="breadcrumb-item active" aria-current="page">Пролонгация</li>
        </ol>
    </nav>

    <div class="prolongation-card">
        <div class="prolongation-kicker">Новый раздел</div>
        <h1 class="h3 prolongation-title">Пролонгация</h1>
        <p class="prolongation-note">Страница находится в разработке.</p>
        <a href="{% url 'policies:payments' %}" class="btn btn-outline-primary btn-sm mt-3">
            <i class="bi bi-arrow-left"></i> Вернуться к платежам
        </a>
    </div>
</div>
{% endblock %}
